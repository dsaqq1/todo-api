name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m compileall -q src

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check src tests

  test:
    name: test
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: >
          pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov
          --cov-fail-under=50
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            app/coverage.xml
            app/htmlcov/

  docker_build:
    name: docker_build
    runs-on: ubuntu-latest
    needs: [build, lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: meta
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "tag=${SHA::7}" >> "$GITHUB_OUTPUT"
      - run: |
          docker build -t todo-api:${{ steps.meta.outputs.tag }} -f app/Dockerfile app/
          docker save todo-api:${{ steps.meta.outputs.tag }} -o image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  docker_push:
    name: docker_push
    runs-on: ubuntu-latest
    needs: [build, lint, test, docker_build]
    steps:
      - name: Set image tag
        id: meta
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "tag=${SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker load -i image.tar
          IMAGE="${DOCKERHUB_USERNAME}/todo-api"
          TAG="${{ steps.meta.outputs.tag }}"
          docker tag "todo-api:${TAG}" "${IMAGE}:${TAG}"
          docker push "${IMAGE}:${TAG}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag "${IMAGE}:${TAG}" "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi
